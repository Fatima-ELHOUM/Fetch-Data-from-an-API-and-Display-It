<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Joke App | Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-container">
        <img src="joke-bg.jpeg" alt="Background" class="bg-image">
    </div>

    <div class="container">
        <div class="joke-card">
            <div class="emoji-header">☀️</div>
            <h1>Daily Smile</h1>
            
            <div class="joke-display">
                <p id="setup">Ready for a laugh?</p>
                <p id="punchline" class="punchline"></p>
            </div>

            <button id="jokeBtn" onclick="getJoke()">Tell Me A Joke!</button>
            <div id="loader" class="loader"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
